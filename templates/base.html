<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css"
          integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1"
          crossorigin="anonymous">
    <title>{{title}}</title>
</head>
<body>
<h1>Миссия Колонизация Марса</h1>
<h4 class="text-secondary">И на Марсе будут яблони цвести!</h4>
<nav style="display: flex; justify-content: flex-end; align-items: center; gap: 10px">
    {% if current_user.is_authenticated %}
    <span>{{ current_user.surname }} {{ current_user.name }}</span>
    <a class="btn btn-primary" href="/logout">Выйти</a>
    {% else %}
    <p>
        <a class="btn btn-primary" href="/register">Зарегистрироваться</a>
        <a class="btn btn-primary" href="/login">Войти</a>
    </p>
    {% endif %}
</nav>
{%block content %} {% endblock %}
</body>
</html>
